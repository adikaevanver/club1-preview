    - region "О сольнике" [ref=e76]:
      - heading "О сольнике" [level=2] [ref=e79]
      - generic [ref=e80]:
        - paragraph [ref=e81]: "Гурам Амарян выходит на сцену Клуба №1 с сольной программой — полтора часа стендапа без разогрева и долгих пауз. Только комик, микрофон и зал, который отвечает смехом. Это не сборный концерт: весь вечер держит один артист, и материал выстроен как цельная история, а не набор случайных шуток."
        - paragraph [ref=e82]: "В программу вошёл материал, который Гурам обкатывал на открытых микрофонах и сборных вечерах: наблюдения о жизни в большом городе, отношениях, работе и семье. Манера — разговорная: комик много импровизирует, реагирует на зал и не боится уводить номер в сторону, если ситуация того просит. Двух одинаковых вечеров не бывает."
        - paragraph [ref=e83]: Концерт идёт единым блоком, 18+. Сбор гостей — за 30 минут до начала. На площадке работают бар и кухня, места — за столиками, так что вечер можно провести спокойно и с компанией.
        - paragraph [ref=e84]: Точный сет-лист артист не раскрывает заранее — как на любом живом стендапе, часть шуток рождается прямо на сцене. Программа и тайминг могут немного меняться от даты к дате.
