      - paragraph [ref=e166]: Цена билета зависит от места в зале и даты показа. Возврат — по условиям продажи, раздел «Возврат билетов» в подвале.
    - region "CLUB№1 представляет «STAND UP ОТ ОПЫТНЫХ КОМИКОВ»" [ref=e167]:
      - generic [ref=e168]:
        - generic [ref=e169]:
          - heading "CLUB№1 представляет «STAND UP ОТ ОПЫТНЫХ КОМИКОВ»" [level=2] [ref=e172]:
            - text: CLUB№1 представляет
            - text: «STAND UP ОТ ОПЫТНЫХ КОМИКОВ»
          - paragraph [ref=e173]: Вас ждут самые опытные комики столицы — те, кто разделит с вами свои лучшие шутки. В составе три комика и ведущий, за плечами которых сотни концертов и открытых микрофонов. Возможно, вы уже видели их на ТНТ, Первом канале или в YouTube.
          - paragraph [ref=e174]: Эти ребята не развлекают вполсилы. Они играют со словами, придумывают образы на ходу и держат зал в нескончаемом потоке смеха. Вечер получится таким, что о нём захочется рассказать друзьям.
          - paragraph [ref=e175]: Составы комиков и шутки всегда разные — двух одинаковых вечеров не бывает. Программа идёт около часа, сбор гостей — за 30 минут до начала.
          - paragraph [ref=e176]: Вас ждут удобные места за столиками. На площадке работают бар и кухня — заказать можно прямо во время шоу.
        - figure "Живой зал · Новый Арбат, 21" [ref=e177]:
          - img "Выступление комика на сцене Клуба №1" [ref=e178]
          - generic [ref=e179]: Живой зал · Новый Арбат, 21
